<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Edit Task</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
</head>
<body>
  <nav class="navbar navbar-expand-lg bg-primary navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="{{ url_for('input') }}">📝 To‑Do App</a>
    </div>
  </nav>

  <!-- Flash Messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <div class="container my-4">
    <div class="card">
      <div class="card-header bg-warning text-dark">
        <h5 class="mb-0">Edit Task #{{ todo.id }}</h5>
      </div>
      <div class="card-body">
        <form action="{{ url_for('edit', id=todo.id) }}" method="POST">
          <div class="mb-3">
            <label for="title" class="form-label">Task Title <span class="text-danger">*</span></label>
            <input type="text" name="title" class="form-control" id="title" value="{{ todo.title }}" required>
          </div>
          <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <input type="text" name="description" class="form-control" id="description" value="{{ todo.description or '' }}">
          </div>
          <div class="row">
            <div class="col-md-4 mb-3">
              <label for="priority" class="form-label">Priority</label>
              <select name="priority" class="form-select" id="priority">
                <option value="high" {% if todo.priority == 'high' %}selected{% endif %}>High</option>
                <option value="medium" {% if todo.priority == 'medium' %}selected{% endif %}>Medium</option>
                <option value="low" {% if todo.priority == 'low' %}selected{% endif %}>Low</option>
              </select>
            </div>
            <div class="col-md-4 mb-3">
              <label for="due_date" class="form-label">Due Date</label>
              <input type="date" name="due_date" class="form-control" id="due_date" value="{{ todo.due_date.strftime('%Y-%m-%d') if todo.due_date else '' }}">
            </div>
            <div class="col-md-4 mb-3">
              <label for="category" class="form-label">Category</label>
              <input type="text" name="category" class="form-control" id="category" value="{{ todo.category }}">
            </div>
          </div>
          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" name="complete" id="complete" {% if todo.complete %}checked{% endif %}>
            <label class="form-check-label" for="complete">
              Mark as complete
            </label>
          </div>
          <button type="submit" class="btn btn-success">Save Changes</button>
          <a href="{{ url_for('input') }}" class="btn btn-secondary">Cancel</a>
        </form>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
          crossorigin="anonymous"></script>
</body>
</html>
